<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Building Ledger Record Summary</title>
  <desc id="desc">Private issue record summary preview.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF2FF"/>
      <stop offset="1" stop-color="#E2E9FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="136" y="98" width="928" height="434" rx="28" fill="white"/>

  <rect x="176" y="138" width="214" height="42" rx="21" fill="#E7EDFF"/>
  <text x="283" y="164" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#2B3E83">Private record</text>

  <text x="176" y="252" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800" fill="#1B2858">Issue summary</text>
  <text x="176" y="304" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="500" fill="#42538E">Timeline and key facts for residents.</text>
  <text x="176" y="346" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="500" fill="#42538E">Share only with trusted key holders.</text>

  <g transform="translate(708 170)">
