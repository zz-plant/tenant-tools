    <line x1="40" y1="72" x2="40" y2="240" stroke="#B6C7FF" stroke-width="4" stroke-linecap="round"/>
    <circle cx="40" cy="96" r="9" fill="#4367DF"/>
    <circle cx="40" cy="150" r="9" fill="#4367DF"/>
    <circle cx="40" cy="204" r="9" fill="#4367DF"/>
    <rect x="62" y="86" width="200" height="12" rx="6" fill="#D9E4FF"/>
    <rect x="62" y="140" width="170" height="12" rx="6" fill="#D9E4FF"/>
    <rect x="62" y="194" width="192" height="12" rx="6" fill="#D9E4FF"/>
  </g>

  <text x="176" y="476" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#223268">Building Ledger</text>
