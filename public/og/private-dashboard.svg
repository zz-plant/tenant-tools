    <rect x="24" y="116" width="138" height="38" rx="19" fill="#3E60D7"/>
    <text x="93" y="140" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="white">Open issues</text>
    <rect x="24" y="172" width="292" height="58" rx="14" fill="#F4F7FF"/>
    <rect x="44" y="191" width="162" height="10" rx="5" fill="#D4E0FF"/>
    <rect x="44" y="209" width="116" height="10" rx="5" fill="#D4E0FF"/>
